<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Rounded square background -->
  <rect width="32" height="32" rx="8" fill="#f97316"/>

  <!-- Letter O — bold ring -->
  <circle cx="13" cy="17" r="6.5" stroke="white" stroke-width="3" fill="none"/>

  <!-- Letter Y — stems emerging from top of O -->
  <line x1="22" y1="8" x2="26" y2="12" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="26" y1="8" x2="22" y2="12" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="24" y1="12" x2="24" y2="17" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
</svg>
